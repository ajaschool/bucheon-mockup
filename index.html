<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 부천문화콘텐츠 성장지원플랫폼</title>
  <link rel="stylesheet" href="colors_and_type.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: var(--font-sans); background: var(--color-canvas); color: var(--color-ink); -webkit-font-smoothing: antialiased; }
    input, button, select, textarea { font-family: var(--font-sans); }
    button { cursor: pointer; }
    input:focus, select:focus { outline: 2px solid var(--color-ink); outline-offset: 1px; }

    /* Calendar today cell: white text */
    .cal-today-num { color: #fff !important; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--color-hairline); border-radius: 3px; }

    /* Hover effects */
    .nav-btn:hover { background: var(--color-surface-2) !important; }
    .btn-primary:hover { background: #2a2a2a !important; }

    /* ────── Promo banner (Meta theme only) ────── */
    #promo-banner {
      display: var(--t-banner-display);
      align-items: center; justify-content: center; gap: 8px;
      background: var(--t-banner-bg); color: var(--t-banner-text);
      padding: 10px 24px; font-size: 13px; font-weight: 600;
      letter-spacing: -0.14px; position: sticky; top: 0; z-index: 50;
    }
    #promo-banner a { color: inherit; text-decoration: underline; opacity: 0.9; }

    /* ────── Theme switcher ────── */
    #theme-switcher {
      position: fixed; top: 12px; right: 16px; z-index: 1000;
      display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
    }
    #theme-trigger {
      background: var(--t-surface-1); border: 1px solid var(--t-hairline);
      border-radius: var(--t-radius-chip); padding: 6px 14px;
      font-size: 12px; font-weight: 500; color: var(--t-ink-muted);
      cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      font-family: var(--font-sans);
      display: inline-flex; align-items: center; gap: 6px;
    }
    #theme-trigger::before { content: '🎨'; font-size: 13px; }
    #theme-menu {
      display: none; flex-direction: column; gap: 4px;
      background: var(--t-surface-1); border: 1px solid var(--t-hairline);
      border-radius: 12px; padding: 8px; box-shadow: 0 10px 32px rgba(0,0,0,0.12);
      min-width: 200px;
    }
    #theme-switcher:hover #theme-menu,
    #theme-switcher.open #theme-menu { display: flex; }
    .theme-opt {
      display: flex; align-items: center; gap: 10px;
      background: transparent; border: none; padding: 9px 12px;
      border-radius: 8px; cursor: pointer; text-align: left;
      font-family: var(--font-sans); font-size: 13px; color: var(--t-ink);
    }
    .theme-opt:hover { background: var(--t-surface-2); }
    .theme-opt[data-active="true"] { background: var(--t-surface-2); font-weight: 600; }
    .theme-opt .swatch {
      width: 24px; height: 24px; border-radius: 6px; flex-shrink: 0;
      border: 1px solid var(--t-hairline);
    }
    .theme-opt .label { flex: 1; }
    .theme-opt .sub { font-size: 11px; color: var(--t-ink-subtle); font-weight: 400; display: block; }

    /* MUI theme: lift cards globally */
    [data-theme="mui"] body { background: var(--t-canvas); }
  </style>
</head>
<body>
  <div id="promo-banner">
    <span>🎉 2026 부천문화콘텐츠 성장지원플랫폼 — 멘토링 시즌 진행 중</span>
    <a href="#">자세히 보기 →</a>
  </div>

  <div id="theme-switcher">
    <button id="theme-trigger" type="button">테마 <span id="theme-current">Intercom</span></button>
    <div id="theme-menu">
      <button class="theme-opt" data-theme-id="default">
        <span class="swatch" style="background: linear-gradient(135deg, #f5f1ec, #111);"></span>
        <span class="label">Intercom <span class="sub">Warm cream · Inter</span></span>
      </button>
      <button class="theme-opt" data-theme-id="cal">
        <span class="swatch" style="background: linear-gradient(135deg, #fff 50%, #111 50%); border-color: #e5e7eb;"></span>
        <span class="label">Cal.com <span class="sub">Mono · Cal Sans</span></span>
      </button>
      <button class="theme-opt" data-theme-id="meta">
        <span class="swatch" style="background: linear-gradient(135deg, #fff 50%, #0064e0 50%);"></span>
        <span class="label">Meta <span class="sub">Pill buttons · Cobalt</span></span>
      </button>
      <button class="theme-opt" data-theme-id="mui">
        <span class="swatch" style="background: linear-gradient(135deg, #fafafa 50%, #1976d2 50%);"></span>
        <span class="label">Material UI <span class="sub">Elevation · Roboto</span></span>
      </button>
    </div>
  </div>

  <script>
    (function () {
      var KEY = 'bucheon_theme';
      var THEMES = {
        'default': 'Intercom',
        'cal': 'Cal.com',
        'meta': 'Meta',
        'mui': 'Material UI'
      };
      function apply(id) {
        if (id === 'default') document.documentElement.removeAttribute('data-theme');
        else document.documentElement.setAttribute('data-theme', id);
        document.getElementById('theme-current').textContent = THEMES[id] || 'Intercom';
        document.querySelectorAll('.theme-opt').forEach(function (b) {
          b.setAttribute('data-active', b.getAttribute('data-theme-id') === id);
        });
        try { localStorage.setItem(KEY, id); } catch (e) {}
        window.dispatchEvent(new CustomEvent('themechange', { detail: { theme: id } }));
        window.__theme = id;
      }
      var saved = 'default';
      try { saved = localStorage.getItem(KEY) || 'default'; } catch (e) {}
      window.__theme = saved;
      apply(saved);
      document.addEventListener('click', function (e) {
        var opt = e.target.closest('.theme-opt');
        if (opt) apply(opt.getAttribute('data-theme-id'));
      });
    })();
  </script>

  <div id="root"></div>

  <!-- Data layer -->
  <script src="data.js"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Component scripts -->
  <script type="text/babel" src="Auth.jsx"></script>
  <script type="text/babel" src="AdminApp.jsx"></script>
  <script type="text/babel" src="MentorApp.jsx"></script>

  <!-- Main App -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    const SESSION_KEY = 'bucheon_session';

    const App = () => {
      const [currentUser, setCurrentUser] = useState(() => {
        try { return JSON.parse(sessionStorage.getItem(SESSION_KEY)); } catch { return null; }
      });
      const [authView, setAuthView] = useState('login'); // 'login' | 'signup'

      const handleLogin = (user) => {
        sessionStorage.setItem(SESSION_KEY, JSON.stringify(user));
        setCurrentUser(user);
      };

      const handleLogout = () => {
        sessionStorage.removeItem(SESSION_KEY);
        setCurrentUser(null);
        setAuthView('login');
      };

      // Refresh user from DB in case approval status changed
      const freshUser = currentUser
        ? window.DB.get().users.find(u => u.id === currentUser.id) || currentUser
        : null;

      if (!freshUser) {
        return authView === 'signup'
          ? <SignupPage onBack={() => setAuthView('login')} />
          : <LoginPage onLogin={handleLogin} onSignup={() => setAuthView('signup')} />;
      }

      if (freshUser.role === 'admin') {
        return <AdminApp user={freshUser} onLogout={handleLogout} />;
      }

      if (!freshUser.approved) {
        return <PendingPage user={freshUser} onLogout={handleLogout} />;
      }

      return <MentorApp user={freshUser} onLogout={handleLogout} />;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
